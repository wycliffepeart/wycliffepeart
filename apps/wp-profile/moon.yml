$schema: "https://moonrepo.dev/schemas/project.json"

id: wp-profile
language: python
layer: application
tags:
  - profile
  - static-site

tasks:
  cli-help:
    command: python3
    options:
      runFromWorkspaceRoot: true
    args:
      - -m
      - scripts.cli
      - --help
  resume-pdf:
    command: python3
    options:
      runFromWorkspaceRoot: true
    args:
      - -m
      - scripts.cli
      - resume-pdf
    outputs:
      - apps/wp-profile/resume.pdf
  init:
    command: python3
    options:
      runFromWorkspaceRoot: true
    args:
      - -m
      - scripts.cli
      - init
  plan:
    command: python3
    options:
      runFromWorkspaceRoot: true
    args:
      - -m
      - scripts.cli
      - plan
  apply:
    command: python3
    options:
      runFromWorkspaceRoot: true
    args:
      - -m
      - scripts.cli
      - apply
  deploy:
    command: python3
    options:
      runFromWorkspaceRoot: true
    args:
      - -m
      - scripts.cli
      - deploy
    outputs:
      - apps/wp-profile/resume.pdf
  run:
    command: python3
    options:
      cache: false
    args:
      - -m
      - http.server
      - "9"
      - --directory
      - .
  terraform-fmt:
    command: terraform
    args:
      - fmt
      - terraform
  terraform-validate:
    command: terraform
    args:
      - -chdir=terraform
      - validate
